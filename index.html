<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f1f5f9;
  --text-secondary: #94a3b8;
  --accent: #3b82f6;
  --border: #334155;
  --danger: #ef4444;
  --warning: #f59e0b;
}
body.light {
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --text-secondary: #64748b;
  --border: #e2e8f0;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { background: var(--bg); color: var(--text); transition: all 0.3s; }

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Header */
.header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 30px; flex-wrap: wrap; gap: 15px;
}
.logo { font-size: 32px; font-weight: 700; }
.logo span { color: var(--accent); }
.header-controls { display: flex; gap: 10px; align-items: center; }

.search-box {
  position: relative;
}
.search-box input {
  padding: 12px 16px 12px 40px; background: var(--card); border: 2px solid var(--border);
  border-radius: 12px; color: var(--text); outline: none; width: 250px;
}
.search-box input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-secondary);
}

.btn {
  padding: 12px 20px; background: var(--accent); color: white; border: none;
  border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(59,130,246,0.3); }
.btn-icon { background: var(--card); border: 2px solid var(--border); color: var(--text); }
.btn-icon:hover { border-color: var(--accent); }

/* Stats */
.stats {
  display: flex; gap: 20px; margin-bottom: 30px;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border); padding: 15px 20px;
  border-radius: 12px; flex: 1;
}
.stat-card p:first-child { color: var(--text-secondary); font-size: 14px; }
.stat-card p:last-child { font-size: 24px; font-weight: 700; margin-top: 5px; }

/* Notes Grid */
.notes-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px; margin-bottom: 80px;
}
.note-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 20px; transition: all 0.3s; cursor: pointer; position: relative;
}
.note-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.note-card.pinned { border-color: var(--warning); }
.pin-badge {
  position: absolute; top: 15px; right: 15px; color: var(--warning); font-size: 18px;
}
.note-header {
  display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;
}
.note-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; word-break: break-word; }
.note-date { color: var(--text-secondary); font-size: 12px; }
.note-content {
  color: var(--text-secondary); line-height: 1.6; margin-bottom: 15px;
  display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
  overflow: hidden; word-break: break-word;
}
.note-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 15px; }
.tag {
  background: var(--bg); padding: 4px 10px; border-radius: 6px;
  font-size: 12px; color: var(--accent);
}
.note-actions {
  display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 15px;
}
.note-btn {
  flex: 1; padding: 8px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--text);
  transition: all 0.2s;
}
.note-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
.note-btn.delete:hover { background: var(--danger); border-color: var(--danger); }

.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-secondary);
}
.empty-state h3 { font-size: 24px; margin-bottom: 10px; color: var(--text); }

/* Modal */
.modal {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;
  padding: 20px;
}
.modal.active { display: flex; }
.modal-content {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 30px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto;
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;
}
.modal-header h2 { font-size: 24px; }
.close-btn {
  background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-secondary);
}
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;
}
.form-group input,.form-group textarea {
  width: 100%; padding: 12px; background: var(--bg); border: 2px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 16px; outline: none;
}
.form-group input:focus,.form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { min-height: 200px; resize: vertical; font-family: inherit; }
.modal-actions { display: flex; gap: 10px; margin-top: 25px; }
.modal-actions.btn { flex: 1; }

/* Floating Add Button */
.fab {
  position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
  background: var(--accent); border: none; border-radius: 50%; color: white;
  font-size: 28px; cursor: pointer; box-shadow: 0 10px 30px rgba(59,130,246,0.4);
  transition: all 0.3s; z-index: 100;
}
.fab:hover { transform: scale(1.1) rotate(90deg); }

@media (max-width: 768px) {
 .header { flex-direction: column; align-items: stretch; }
 .search-box input { width: 100%; }
 .stats { flex-direction: column; }
 .notes-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1 class="logo">📝 Notes<span>App</span></h1>
    <div class="header-controls">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search notes..." oninput="searchNotes()">
      </div>
      <button class="btn-icon" onclick="toggleTheme()">🌓</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <p>Total Notes</p>
      <p id="totalNotes">0</p>
    </div>
    <div class="stat-card">
      <p>Pinned</p>
      <p id="pinnedNotes">0</p>
    </div>
  </div>

  <!-- Notes Grid -->
  <div class="notes-grid" id="notesGrid"></div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState">
    <h3>No notes yet</h3>
    <p>Click the + button to create your first note</p>
  </div>
</div>

<!-- Floating Add Button -->
<button class="fab" onclick="openModal()">+</button>

<!-- Modal -->
<div class="modal" id="noteModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">New Note</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <form onsubmit="saveNote(event)">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="noteTitle" placeholder="Note title..." required>
      </div>
      <div class="form-group">
        <label>Content</label>
        <textarea id="noteContent" placeholder="Write your note here..." required></textarea>
      </div>
      <div class="form-group">
        <label>Tags (comma separated)</label>
        <input type="text" id="noteTags" placeholder="work, ideas, personal">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-icon" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn">Save Note</button>
      </div>
    </form>
  </div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem('notes') || '[]');
let editingId = null;

// Theme
function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light')? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

// Render Notes
function renderNotes(notesToRender = notes) {
  const grid = document.getElementById('notesGrid');
  const empty = document.getElementById('emptyState');

  if (notesToRender.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    // Pinned notes first
    const sorted = [...notesToRender].sort((a, b) => b.pinned - a.pinned || b.createdAt - a.createdAt);

    grid.innerHTML = sorted.map(note => `
      <div class="note-card ${note.pinned? 'pinned' : ''}" onclick="editNote(${note.id})">
        ${note.pinned? '<div class="pin-badge">📌</div>' : ''}
        <div class="note-header">
          <div>
            <div class="note-title">${escapeHtml(note.title)}</div>
            <div class="note-date">${formatDate(note.createdAt)}</div>
          </div>
        <div class="note-content">${escapeHtml(note.content)}</div>
        ${note.tags.length? `
          <div class="note-tags">
            ${note.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
          </div>
        ` : ''}
        <div class="note-actions">
          <button class="note-btn" onclick="togglePin(${note.id}, event)">${note.pinned? 'Unpin' : 'Pin'}</button>
          <button class="note-btn delete" onclick="deleteNote(${note.id}, event)">Delete</button>
        </div>
      </div>
    `).join('');
  }

  updateStats();
}

function updateStats() {
  document.getElementById('totalNotes').textContent = notes.length;
  document.getElementById('pinnedNotes').textContent = notes.filter(n => n.pinned).length;
}

// Modal
function openModal(note = null) {
  const modal = document.getElementById('noteModal');
  const title = document.getElementById('modalTitle');

  if (note) {
    editingId = note.id;
    title.textContent = 'Edit Note';
    document.getElementById('noteTitle').value = note.title;
    document.getElementById('noteContent').value = note.content;
    document.getElementById('noteTags').value = note.tags.join(', ');
  } else {
    editingId = null;
    title.textContent = 'New Note';
    document.getElementById('noteTitle').value = '';
    document.getElementById('noteContent').value = '';
    document.getElementById('noteTags').value = '';
  }

  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('noteModal').classList.remove('active');
  editingId = null;
}

// Save Note
function saveNote(e) {
  e.preventDefault();

  const title = document.getElementById('noteTitle').value.trim();
  const content = document.getElementById('noteContent').value.trim();
  const tagsInput = document.getElementById('noteTags').value.trim();
  const tags = tagsInput? tagsInput.split(',').map(t => t.trim()).filter(t => t) : [];

  if (editingId) {
    const index = notes.findIndex(n => n.id === editingId);
    notes[index] = {...notes[index], title, content, tags, updatedAt: Date.now() };
  } else {
    notes.push({
      id: Date.now(),
      title,
      content,
      tags,
      pinned: false,
      createdAt: Date.now(),
      updatedAt: Date.now()
    });
  }

  localStorage.setItem('notes', JSON.stringify(notes));
  renderNotes();
  closeModal();
}

// Edit Note
function editNote(id) {
  const note = notes.find(n => n.id === id);
  openModal(note);
}

// Delete Note
function deleteNote(id, e) {
  e.stopPropagation();
  if (confirm('Delete this note?')) {
    notes = notes.filter(n => n.id!== id);
    localStorage.setItem('notes', JSON.stringify(notes));
    renderNotes();
  }
}

// Pin Note
function togglePin(id, e) {
  e.stopPropagation();
  const note = notes.find(n => n.id === id);
  note.pinned =!note.pinned;
  localStorage.setItem('notes', JSON.stringify(notes));
  renderNotes();
}

// Search
function searchNotes() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const filtered = notes.filter(note =>
    note.title.toLowerCase().includes(query) ||
    note.content.toLowerCase().includes(query) ||
    note.tags.some(tag => tag.toLowerCase().includes(query))
  );
  renderNotes(filtered);
}

// Utils
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatDate(timestamp) {
  const date = new Date(timestamp);
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// Close modal on outside click
document.getElementById('noteModal').addEventListener('click', (e) => {
  if (e.target.id === 'noteModal') closeModal();
});

// Init
renderNotes();
</script>
</body>
</html>
